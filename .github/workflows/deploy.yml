name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  deploy:
    name: Manual Railway deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image names to lowercase
        run: |
          echo "BACKEND_IMAGE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/pokerzada-backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/pokerzada-frontend" >> $GITHUB_ENV

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service pokerzada-backend -- -y
          railway up --service pokerzada-frontend -- -y