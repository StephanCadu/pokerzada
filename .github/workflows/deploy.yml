name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set registry and images to lowercase
        run: |
          echo "REGISTRY=ghcr.io/$(echo ${{ github.actor }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/pokerzada-backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/pokerzada-frontend" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Railway
        uses: railwayapp/actions@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: pokerzada-backend
          image: $REGISTRY/${BACKEND_IMAGE}:${{ github.sha }}

      - name: Deploy frontend to Railway
        uses: railwayapp/actions@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: pokerzada-frontend
          image: $REGISTRY/${FRONTEND_IMAGE}:${{ github.sha }}