name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      BACKEND_IMAGE: ${{ github.repository }}/pokerzada-backend
      FRONTEND_IMAGE: ${{ github.repository }}/pokerzada-frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend
        working-directory: backend
        run: |
          mvn -B package -DskipTests

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Run backend tests
        working-directory: backend
        run: |
          mvn -B test

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set registry to lowercase
        run: |
          echo "REGISTRY=ghcr.io/$(echo ${{ github.actor }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "BACKEND_IMAGE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/pokerzada-backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/pokerzada-frontend" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        run: |
          docker build -f Dockerfile.backend -t $REGISTRY/${BACKEND_IMAGE}:${{ github.sha }} .
          docker push $REGISTRY/${BACKEND_IMAGE}:${{ github.sha }}

      - name: Build and push frontend Docker image
        run: |
          docker build -f Dockerfile.frontend -t $REGISTRY/${FRONTEND_IMAGE}:${{ github.sha }} .
          docker push $REGISTRY/${FRONTEND_IMAGE}:${{ github.sha }}

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image names to lowercase
        run: |
          echo "BACKEND_IMAGE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/pokerzada-backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/pokerzada-frontend" >> $GITHUB_ENV

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy backend and frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service pokerzada-backend --yes
          railway up --service pokerzada-frontend --yes
