name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build, test and publish
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      BACKEND_IMAGE: ${{ github.repository }}/pokerzada-backend
      FRONTEND_IMAGE: ${{ github.repository }}/pokerzada-frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend and run tests
        working-directory: backend
        run: |
          mvn -B test package

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        run: |
          docker build -f Dockerfile.backend -t $REGISTRY/${BACKEND_IMAGE}:${{ github.sha }} .
          docker push $REGISTRY/${BACKEND_IMAGE}:${{ github.sha }}

      - name: Build and push frontend Docker image
        run: |
          docker build -f Dockerfile.frontend -t $REGISTRY/${FRONTEND_IMAGE}:${{ github.sha }} .
          docker push $REGISTRY/${FRONTEND_IMAGE}:${{ github.sha }}
